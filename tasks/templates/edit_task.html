{% extends 'master/base.html' %}

{% block title %}Edit Task | Tasker{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-10">
        <a href="{% url 'task_list_page' %}" class="text-slate-400 hover:text-blue-400 text-sm font-medium flex items-center transition-colors mb-4">
            <i class="fas fa-arrow-left mr-2"></i> Back to Task List
        </a>
        <h1 class="text-3xl font-extrabold text-white tracking-tight">Edit Your Task</h1>
        <p class="text-slate-400 mt-1 text-sm">Update the details below to keep your task organized.</p>
    </div>

    <div class="bg-slate-800/40 border border-slate-700/50 rounded-3xl p-8 shadow-2xl backdrop-blur-sm">
        <form method="POST" action="{% url 'edit_task' task.id %}" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="title" class="block text-sm font-semibold text-slate-300 mb-2">Task Title</label>
                <input type="text" name="title" id="title" value="{{ task.title }}" required
                       class="w-full px-5 py-3.5 bg-slate-900/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all placeholder:text-slate-600">
            </div>

            <div>
                <label for="description" class="block text-sm font-semibold text-slate-300 mb-2">Description</label>
                <textarea name="description" id="description" rows="5" required
                          class="w-full px-5 py-3.5 bg-slate-900/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all placeholder:text-slate-600">{{ task.description }}</textarea>
            </div>

            <div>
                <label for="status" class="block text-sm font-semibold text-slate-300 mb-2">Current Status</label>
                <select name="status" id="status" 
                        class="w-full px-5 py-3.5 bg-slate-900/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-blue-500 transition-all appearance-none cursor-pointer">
                    <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
                    <option value="InProgress" {% if task.status == 'InProgress' %}selected{% endif %}>In Progress</option>
                    <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
                </select>
            </div>

            <div class="pt-6 flex items-center gap-4">
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-600/20 active:scale-[0.98]">
                    <i class="fas fa-save mr-2"></i> Update Task
                </button>
                <a href="{% url 'task_list_page' %}" class="px-8 py-3.5 bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold rounded-xl transition-all">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
