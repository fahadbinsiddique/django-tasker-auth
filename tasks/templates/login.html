<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tasker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-500/30 mb-4">
                <i class="fas fa-lock text-white text-2xl"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-white tracking-tight">Welcome Back</h2>
            <p class="text-slate-400 mt-2">Please enter your details to sign in</p>
        </div>

        <div class="glass-card rounded-3xl p-8 shadow-2xl">
            <form action="" method="POST" class="space-y-6">
                {% csrf_token %}
                

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Username</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 group-focus-within:text-indigo-400 transition-colors">
                            <i class="fas fa-user-circle"></i>
                        </span>
                        <input type="text" name="username" required
                            class="block w-full pl-10 pr-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all"
                            placeholder="your_username">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-1.5 ml-1">
                        <label class="text-sm font-medium text-slate-300">Password</label>
                        <a href="#" class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500 group-focus-within:text-indigo-400 transition-colors">
                            <i class="fas fa-key"></i>
                        </span>
                        <input type="password" name="password" required
                            class="block w-full pl-10 pr-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-700 bg-slate-800 text-indigo-600 focus:ring-indigo-500/50">
                    <label for="remember" class="ml-2 text-sm text-slate-400">Remember me</label>
                </div>

                <button type="submit"
                    class="w-full py-3.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg shadow-indigo-600/20 transform transition-all active:scale-[0.98]">
                    Sign In
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-700/50 text-center">
                <p class="text-slate-400 text-sm">
                    Don't have an account? 
                    <a href="#" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">Create one</a>
                </p>
            </div>
        </div>
        
        <p class="text-center text-slate-500 text-xs mt-8">
            &copy; 2026 Tasker App. Secure Login Portal.
        </p>
    </div>

</body>
</html>
