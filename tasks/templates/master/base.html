<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tasker | Manage Your Work{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
        }
        .nav-glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-link {
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    {% include 'master/nav.html' %}

    <main class="flex-grow container mx-auto px-4 py-8">
        {% block content %}
        
        {% endblock %}
    </main>

    <footer class="border-t border-slate-800 py-8 bg-slate-900/50">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-500 text-sm">
                &copy; 2026 Tasker Application. Created for High-Performance Teams.
            </p>
        </div>
    </footer>

</body>
</html>
